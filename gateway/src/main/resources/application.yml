server:
  port: ${PORT:8080}

spring:
  application:
    name: northwind-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:YTFiMmMzZDRlNWY2YTdiOGM5ZDBlMWYyYTNiNGM1ZDZlN2Y4YTliMGMxZDJlM2Y0YTViNmM3ZDhl}

gateway:
  backend-uri: ${BACKEND_URI:http://backend:8081}
  rate-limiter:
    replenish-rate: 20
    burst-capacity: 40

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.northwind.gateway: DEBUG