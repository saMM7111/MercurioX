services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-northwind}
      POSTGRES_USER: ${POSTGRES_USER:-northwind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/northwind.sql:/docker-entrypoint-initdb.d/northwind.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-northwind} -d ${POSTGRES_DB:-northwind}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-northwind}
      POSTGRES_USER: ${POSTGRES_USER:-northwind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-at-least-32-chars-secret}
      SPRING_PROFILES_ACTIVE: dev
      APP_SEED_DEMO_USERS: "true"
      APP_DEMO_PASSWORD: "Passw0rd!"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BACKEND_URI: http://backend:8081
      JWT_SECRET: ${JWT_SECRET:-change-me-to-at-least-32-chars-secret}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      VITE_API_PROXY_TARGET: http://gateway:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data: